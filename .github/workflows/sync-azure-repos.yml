name: Sync GitHub to Azure Repos

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Azure Remote
        run: |
          git remote add azure https://${{ secrets.AZURE_DEVOPS_PAT }}@dev.azure.com/manoonam1729/ManoDeployment/_git/ManoDeployment

      - name: Push to Azure Repos
        run: |
          git push azure main
