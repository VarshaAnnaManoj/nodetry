openapi: 3.0.0

info:
  title: My API
  version: 1.0.0
  description: Express Prisma Swagger API

servers:
  - url: http://localhost:5000

paths:
  /:
    get:
      summary: Home Route
      responses:
        '200':
          description: Success

  /api/message:
    get:
      summary: Get API message
      responses:
        '200':
          description: API message returned

  /api/states:
    get:
      summary: Get all states
      responses:
        '200':
          description: List of states
